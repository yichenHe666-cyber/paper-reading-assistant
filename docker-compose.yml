version: '3.8'

services:
  reading-assistant:
    build: .
    container_name: reading-assistant
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - C:/Users/Public/Documents:/obsidian_vault
    environment:
      - DATABASE_PATH=/app/data/reading_assistant.db
      - OBSIDIAN_VAULT_PATH=/obsidian_vault
    env_file:
      - .env
    restart: unless-stopped
