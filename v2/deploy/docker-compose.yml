# 核动力科研牛马 v2 — Docker Compose 编排。
#
# 三个服务：backend（Go API）、core（Rust 向量化/记忆/梦境）、frontend（nginx SPA）。
# 数据卷：nro-data 挂载到 backend 与 core 的 /data，共享同一 SQLite 文件（WAL 多进程）。
# 网络：nro-net 内网，core 不 publish 公网端口，仅 backend 可访问 8788。
#
# 一键启动：docker compose up -d
# 首次需配置 .env（拷贝 .env.example 填写 LLM key 等）。
# 必须在本目录（deploy/）下执行，compose 会自动加载本目录的 .env。
services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
      args:
        VERSION: "${VERSION:-v2.0.0}"
    image: nuclear-ox-backend:v2
    container_name: nro-backend
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      # 监听容器内全部接口（compose 网络内可达）；外网访问经 frontend nginx 反代
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      # 数据目录（与 core 共享卷）
      NRO_DATA_DIR: "/data"
      # LLM 配置（.env 已含；此处仅给容器场景默认值兜底，会被 env_file 覆盖）
      LLM_PROVIDER: "${LLM_PROVIDER:-ollama}"
      LLM_API_BASE: "${LLM_API_BASE:-http://host.docker.internal:11434/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-qwen2.5:7b}"
      # Rust core 地址（compose 内网服务名）
      CORE_BASE_URL: "http://core:8788"
      CORE_TIMEOUT: "60"
      # company 源用 GitHub Token（追踪 9 家 AI 公司 org，非 Papers We Love）
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      # 种子论文路径（与卷挂载 /data 对齐；用户可将 seed_papers.json 放入卷根目录）
      SEED_PAPERS_PATH: "/data/seed_papers.json"
      TZ: "Asia/Shanghai"
    volumes:
      - nro-data:/data
    networks:
      - nro-net
    ports:
      # 仅本机暴露，外网访问走 frontend nginx 的 8080
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    extra_hosts:
      # 让容器内能访问宿主的 Ollama（Linux 必需，macOS/Windows 自动有）
      - "host.docker.internal:host-gateway"
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.core
    image: nuclear-ox-core:v2
    container_name: nro-core
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NRO_DATA_DIR: "/data"
      CORE_HOST: "0.0.0.0"
      CORE_PORT: "8788"
      # embedding 配置
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-ollama}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      EMBEDDING_API_BASE: "${EMBEDDING_API_BASE:-http://host.docker.internal:11434}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-}"
      EMBEDDING_TIMEOUT_SECS: "30"
      # 记忆参数
      RECENCY_HALF_LIFE_DAYS: "${RECENCY_HALF_LIFE_DAYS:-30}"
      MAX_AGE_DAYS: "${MAX_AGE_DAYS:-365}"
      RUST_LOG: "info"
      TZ: "Asia/Shanghai"
    volumes:
      - nro-data:/data
    networks:
      - nro-net
    # 不 publish 端口：仅 compose 内网 backend 可访问
    expose:
      - "8788"
    extra_hosts:
      # 让容器内能访问宿主的 Ollama
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: nuclear-ox-frontend:v2
    container_name: nro-frontend
    restart: unless-stopped
    init: true
    networks:
      - nro-net
    ports:
      # 唯一对外端口：本机 8080（生产可改 80 或加反代/TLS）
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  nro-data:
    # 命名卷：容器重建不丢数据（痛点②根治的部署层保障）
    name: nro-data

networks:
  nro-net:
    driver: bridge
